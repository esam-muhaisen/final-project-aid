<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTA API Explorer & Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: rgba(20, 27, 45, 0.6);
            --surface-hover: rgba(30, 40, 65, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --success-color: #10b981;
            --error-color: #ef4444;
            --warning-color: #f59e0b;
            --info-color: #3b82f6;
            
            /* Method Colors */
            --method-get: #0ea5e9;
            --method-post: #10b981;
            --method-put: #f59e0b;
            --method-delete: #ef4444;
            --method-patch: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.08) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-color);
            height: 100vh;
            position: fixed;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: rgba(11, 15, 25, 0.95);
            backdrop-filter: blur(10px);
            z-index: 2;
        }

        .sidebar-header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .endpoint-list {
            padding: 16px;
            flex-grow: 1;
        }

        .endpoint-group {
            margin-bottom: 24px;
        }

        .endpoint-group-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            padding-left: 8px;
            font-weight: 600;
        }

        .endpoint-item {
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
        }

        .endpoint-item:hover, .endpoint-item.active {
            background: var(--surface-hover);
        }

        .method-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            min-width: 54px;
            text-align: center;
        }

        .method-get { background: rgba(14, 165, 233, 0.15); color: var(--method-get); }
        .method-post { background: rgba(16, 185, 129, 0.15); color: var(--method-post); }
        .method-put { background: rgba(245, 158, 11, 0.15); color: var(--method-put); }
        .method-delete { background: rgba(239, 68, 68, 0.15); color: var(--method-delete); }
        .method-patch { background: rgba(139, 92, 246, 0.15); color: var(--method-patch); }

        .endpoint-path {
            font-size: 13px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Main Content */
        .main-content {
            margin-left: 320px;
            flex-grow: 1;
            padding: 40px;
            max-width: 1000px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
        }

        .empty-state h2 {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .tester-container {
            display: none;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .header-method {
            font-size: 16px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .header-path {
            font-size: 24px;
            font-weight: 600;
            word-break: break-all;
        }

        /* Guide Section */
        .guide-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .guide-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--info-color);
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .guide-description {
            font-size: 14px;
            line-height: 1.6;
            color: #cbd5e1;
        }

        .section-title {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        textarea, input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Consolas', monospace;
            outline: none;
            transition: all 0.3s;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        textarea:focus, input[type="text"]:focus {
            border-color: var(--primary-color);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            box-shadow: none;
        }

        .response-section {
            margin-top: 32px;
            display: none;
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .status-badge {
            font-size: 13px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .status-success { background: rgba(16, 185, 129, 0.15); color: var(--success-color); }
        .status-error { background: rgba(239, 68, 68, 0.15); color: var(--error-color); }

        .response-body {
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #a5b4fc;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* Token Input */
        .auth-bar {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .auth-bar input {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }
        
        .auth-bar input:focus {
            border-color: var(--primary-color);
        }
        
        .params-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .param-row {
            display: flex;
            gap: 12px;
        }
        
        .param-row input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h1>RTA API Explorer</h1>
            <input type="text" id="searchInput" class="search-input" placeholder="Search endpoints...">
        </div>
        <div class="auth-bar">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            <input type="text" id="globalToken" placeholder="Paste Bearer Token here for Auth...">
        </div>
        <div class="endpoint-list" id="endpointList">
            <div style="text-align: center; color: #94a3b8; padding: 20px;">Loading routes...</div>
        </div>
    </div>

    <div class="main-content">
        <div class="empty-state" id="emptyState">
            <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24" style="margin-bottom: 20px; color: #4f46e5;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5"></path>
            </svg>
            <h2>Welcome to API Explorer</h2>
            <p>Select an endpoint from the sidebar to start testing.</p>
        </div>

        <div class="tester-container" id="testerContainer">
            <div class="header-section">
                <div class="header-method" id="currentMethod">GET</div>
                <div class="header-path" id="currentPath">/api/example</div>
            </div>

            <!-- Endpoint Guide Section -->
            <div class="guide-box" id="guideBox">
                <div class="guide-title">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Endpoint Guide
                </div>
                <div class="guide-description" id="guideDescription">
                    Select an endpoint to see how to use it.
                </div>
            </div>

            <div id="pathParamsSection" style="display: none;">
                <div class="section-title">Path Parameters</div>
                <div class="params-container" id="pathParamsContainer"></div>
            </div>

            <div id="bodySection">
                <div class="section-title">
                    Request Body (JSON)
                    <button class="btn btn-outline" style="padding: 4px 12px; font-size: 12px;" onclick="formatJSON()">Format</button>
                </div>
                <div class="input-group">
                    <textarea id="requestBody" placeholder="Enter JSON body here..."></textarea>
                </div>
            </div>

            <div class="action-bar">
                <div style="font-size: 12px; color: var(--text-secondary);">
                    Auth: <span id="authStatus">Not set (Add token in sidebar)</span>
                </div>
                <button class="btn" id="sendBtn" onclick="sendRequest()">
                    <span>Send Request</span>
                    <div class="loader" id="loader"></div>
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>

            <div class="response-section" id="responseSection">
                <div class="section-title">Response</div>
                <div class="response-header">
                    <div class="status-badge" id="responseStatus">200 OK</div>
                    <div style="font-size: 12px; color: var(--text-secondary);" id="responseTime">124ms</div>
                </div>
                <pre class="response-body" id="responseBody"></pre>
            </div>
        </div>
    </div>

    <script>
        let allEndpoints = [];
        let currentEndpoint = null;

        // Fetch routes from the backend
        async function fetchRoutes() {
            try {
                const res = await fetch('/tester/routes');
                const data = await res.json();
                if (data.success) {
                    processEndpoints(data.endpoints);
                }
            } catch (err) {
                document.getElementById('endpointList').innerHTML = `<div style="color: red; padding: 20px;">Error loading routes. Make sure backend is running.</div>`;
            }
        }

        function processEndpoints(rawEndpoints) {
            allEndpoints = [];
            rawEndpoints.forEach(ep => {
                if (ep.path === '/health' || ep.path.startsWith('/tester')) return;
                ep.methods.forEach(method => {
                    allEndpoints.push({
                        path: ep.path,
                        method: method.toUpperCase(),
                        module: ep.path.split('/')[2] || 'core'
                    });
                });
            });
            allEndpoints.sort((a, b) => a.module.localeCompare(b.module) || a.path.localeCompare(b.path));
            renderEndpoints(allEndpoints);
        }

        function renderEndpoints(endpointsToRender) {
            const list = document.getElementById('endpointList');
            list.innerHTML = '';
            
            if (endpointsToRender.length === 0) {
                list.innerHTML = `<div style="text-align: center; color: #94a3b8; padding: 20px;">No endpoints found</div>`;
                return;
            }

            let currentModule = '';

            endpointsToRender.forEach((ep, index) => {
                if (ep.module !== currentModule) {
                    currentModule = ep.module;
                    const title = document.createElement('div');
                    title.className = 'endpoint-group-title';
                    title.style.marginTop = index === 0 ? '0' : '16px';
                    title.textContent = currentModule;
                    list.appendChild(title);
                }

                const item = document.createElement('div');
                item.className = 'endpoint-item';
                item.onclick = () => selectEndpoint(ep, item);
                
                const methodBadge = document.createElement('div');
                methodBadge.className = `method-badge method-${ep.method.toLowerCase()}`;
                methodBadge.textContent = ep.method;

                const pathText = document.createElement('div');
                pathText.className = 'endpoint-path';
                pathText.textContent = ep.path;
                pathText.title = ep.path;

                item.appendChild(methodBadge);
                item.appendChild(pathText);
                list.appendChild(item);
            });
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allEndpoints.filter(ep => 
                ep.path.toLowerCase().includes(query) || 
                ep.module.toLowerCase().includes(query) ||
                ep.method.toLowerCase().includes(query)
            );
            renderEndpoints(filtered);
        });

        // Token Input Listener
        document.getElementById('globalToken').addEventListener('input', (e) => {
            const status = document.getElementById('authStatus');
            if (e.target.value.trim()) {
                status.textContent = 'Token attached';
                status.style.color = 'var(--success-color)';
            } else {
                status.textContent = 'Not set (Add token in sidebar)';
                status.style.color = 'var(--text-secondary)';
            }
        });

        // ==========================================
        // GUIDE GENERATOR FUNCTION
        // ==========================================
        function getEndpointGuide(method, path) {
            let guide = {
                description: "No specific documentation is available for this endpoint yet. It requires authorization in most cases.",
                exampleBody: null,
                exampleParams: {}
            };

            // Auth
            if (path.includes('/auth/login') && method === 'POST') {
                guide.description = "يستخدم لتسجيل دخول المستخدمين. أدخل البريد الإلكتروني وكلمة المرور للحصول على Token. انسخ الـ Token الناتج وضعه في خانة 'Bearer Token' في القائمة الجانبية.";
                guide.exampleBody = { email: "admin@example.com", password: "password123" };
            } else if (path.includes('/auth/register') && method === 'POST') {
                guide.description = "يستخدم لتسجيل مستخدم جديد في النظام. يمكنك تحديد صلاحية (Role) مثل DONOR, EMPLOYEE, ORGANIZATION.";
                guide.exampleBody = { name: "Ahmed", email: "ahmed@example.com", password: "password123", role: "DONOR" };
            } 
            // Users
            else if (path.includes('/users') && method === 'POST') {
                guide.description = "يستخدم لإضافة مستخدم جديد. يحتاج صلاحية أدمن (ADMIN).";
                guide.exampleBody = { name: "Ali", email: "ali@example.com", password: "password123", role: "EMPLOYEE" };
            } 
            // Beneficiaries
            else if (path.includes('/beneficiaries') && method === 'POST') {
                guide.description = "يستخدم لتسجيل مستفيد جديد يطلب المساعدة من قبل الأدمن فقط (يتطلب صلاحية admin). يجب إدخال رقم الهوية الوطني والبيانات الأساسية.";
                guide.exampleBody = { name: "Mohammed", nationalId: "987654321", phone: "0590000000", address: "Gaza", familySize: 6 };
            }
            // Donors
            else if (path.includes('/donors') && method === 'POST') {
                guide.description = "تسجيل ملف متبرع جديد.";
                guide.exampleBody = { name: "Omar", email: "omar@example.com", phone: "+972591234567", type: "INDIVIDUAL" };
            }
            // Aid Categories & Types
            else if (path.includes('/aid-categories') && method === 'POST') {
                guide.description = "إضافة فئة مساعدات جديدة (مثلاً: غذائية، طبية).";
                guide.exampleBody = { name: "Medical Aid", description: "All medical and health supplies" };
            }
            else if (path.includes('/aid-types') && method === 'POST') {
                guide.description = "إضافة نوع مساعدة محدد يتبع لفئة معينة.";
                guide.exampleBody = { name: "First Aid Kit", categoryId: "1", unit: "BOX" };
            }
            // Campaigns
            else if (path.includes('/campaigns') && method === 'POST') {
                guide.description = "إنشاء حملة تبرعات جديدة لجمع الدعم.";
                guide.exampleBody = { title: "Winter Relief", description: "Provide warmth to families", targetAmount: 50000, startDate: "2026-11-01T00:00:00Z", endDate: "2026-12-31T00:00:00Z" };
            }
            // Donations
            else if (path.includes('/donations') && method === 'POST') {
                guide.description = "تسجيل عملية تبرع مالي أو عيني في النظام.";
                guide.exampleBody = { amount: 500, currency: "USD", type: "FINANCIAL", donorId: "1" };
            }
            // Generic rules
            else if (method === 'GET' && path.includes('/:id')) {
                guide.description = "يقوم بجلب بيانات عنصر واحد فقط بناءً على الـ ID الخاص به.";
                guide.exampleParams = { id: "1" };
            } else if (method === 'GET') {
                guide.description = "يقوم بجلب قائمة بجميع العناصر. يمكنك في بعض الروابط استخدام Pagination (page, limit) عبر الـ Query Params.";
            } else if (method === 'PUT' || method === 'PATCH') {
                guide.description = "يستخدم لتحديث بيانات عنصر موجود مسبقاً. قم بتمرير البيانات التي تريد تعديلها فقط في الـ JSON.";
                guide.exampleBody = { status: "ACTIVE", name: "Updated Name" };
                guide.exampleParams = { id: "1" };
            } else if (method === 'DELETE') {
                guide.description = "يقوم بحذف العنصر المختار من قاعدة البيانات نهائياً أو يحوله إلى محذوف (Soft Delete).";
                guide.exampleParams = { id: "1" };
            }

            return guide;
        }

        function selectEndpoint(ep, element) {
            currentEndpoint = ep;
            
            // UI updates
            document.querySelectorAll('.endpoint-item').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');
            
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('testerContainer').style.display = 'block';
            document.getElementById('responseSection').style.display = 'none';

            // Set Header
            const methodEl = document.getElementById('currentMethod');
            methodEl.textContent = ep.method;
            methodEl.className = `header-method method-${ep.method.toLowerCase()}`;
            document.getElementById('currentPath').textContent = ep.path;

            // Generate Guide & Data
            const guide = getEndpointGuide(ep.method, ep.path);
            document.getElementById('guideDescription').innerHTML = `<strong>وصف الـ Endpoint:</strong> <br> ${guide.description}`;

            // Show/Hide Body Section and fill Example Body
            if (['GET', 'DELETE'].includes(ep.method)) {
                document.getElementById('bodySection').style.display = 'none';
            } else {
                document.getElementById('bodySection').style.display = 'block';
                document.getElementById('requestBody').value = guide.exampleBody 
                    ? JSON.stringify(guide.exampleBody, null, 2) 
                    : '{\n  \n}';
            }

            // Path Parameters extraction
            const pathParams = [...ep.path.matchAll(/:([a-zA-Z0-9_]+)/g)].map(m => m[1]);
            const pathParamsSection = document.getElementById('pathParamsSection');
            const pathParamsContainer = document.getElementById('pathParamsContainer');
            
            if (pathParams.length > 0) {
                pathParamsSection.style.display = 'block';
                pathParamsContainer.innerHTML = '';
                pathParams.forEach(param => {
                    const row = document.createElement('div');
                    row.className = 'param-row';
                    
                    // Put example param if available
                    let defaultVal = guide.exampleParams[param] || "";
                    if (!defaultVal && param === 'id') defaultVal = "1";

                    row.innerHTML = `
                        <input type="text" placeholder="${param}" value="" disabled style="flex: 0.3; background: transparent; border-color: transparent;">
                        <input type="text" id="param_${param}" placeholder="أدخل قيمة الـ :${param} هنا..." value="${defaultVal}">
                    `;
                    pathParamsContainer.appendChild(row);
                });
            } else {
                pathParamsSection.style.display = 'none';
            }
        }

        function formatJSON() {
            const textarea = document.getElementById('requestBody');
            try {
                const parsed = JSON.parse(textarea.value);
                textarea.value = JSON.stringify(parsed, null, 2);
            } catch (e) {
                alert("Invalid JSON format");
            }
        }

        async function sendRequest() {
            if (!currentEndpoint) return;

            const btn = document.getElementById('sendBtn');
            const loader = document.getElementById('loader');
            const btnText = btn.querySelector('span');
            const btnIcon = btn.querySelector('svg');

            // Construct final URL
            let url = currentEndpoint.path;
            const pathParams = [...currentEndpoint.path.matchAll(/:([a-zA-Z0-9_]+)/g)].map(m => m[1]);
            pathParams.forEach(param => {
                const val = document.getElementById(`param_${param}`).value;
                if (val) url = url.replace(`:${param}`, val);
            });

            const options = {
                method: currentEndpoint.method,
                headers: {
                    'Content-Type': 'application/json'
                }
            };

            const token = document.getElementById('globalToken').value.trim();
            if (token) {
                options.headers['Authorization'] = `Bearer ${token}`;
            }

            if (!['GET', 'DELETE'].includes(currentEndpoint.method)) {
                try {
                    const bodyVal = document.getElementById('requestBody').value;
                    if (bodyVal.trim()) {
                        JSON.parse(bodyVal); // Validate
                        options.body = bodyVal;
                    }
                } catch (e) {
                    alert("نص الـ JSON غير صالح! الرجاء التأكد من كتابته بشكل صحيح.");
                    return;
                }
            }

            // UI Loading state
            btnText.style.display = 'none';
            btnIcon.style.display = 'none';
            loader.style.display = 'block';
            document.getElementById('responseSection').style.display = 'none';

            const startTime = performance.now();

            try {
                const response = await fetch(url, options);
                const endTime = performance.now();
                
                const responseText = await response.text();
                let responseJson;
                try {
                    responseJson = JSON.parse(responseText);
                } catch (e) {
                    responseJson = responseText;
                }

                // Show Response
                const responseSection = document.getElementById('responseSection');
                const statusBadge = document.getElementById('responseStatus');
                const timeEl = document.getElementById('responseTime');
                const bodyEl = document.getElementById('responseBody');

                responseSection.style.display = 'block';
                statusBadge.textContent = `${response.status} ${response.statusText}`;
                statusBadge.className = `status-badge ${response.ok ? 'status-success' : 'status-error'}`;
                timeEl.textContent = `${Math.round(endTime - startTime)}ms`;
                
                bodyEl.textContent = typeof responseJson === 'object' 
                    ? JSON.stringify(responseJson, null, 2) 
                    : responseJson;

            } catch (err) {
                alert("حدث خطأ في الاتصال: " + err.message);
            } finally {
                // Reset UI
                btnText.style.display = 'block';
                btnIcon.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        // Initialize
        fetchRoutes();
    </script>
</body>
</html>
